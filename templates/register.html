<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - HomiAI</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial,sans-serif;
            color:white;
        }

        .card{
            width:420px;
            background:#1e293b;
            padding:40px;
            border-radius:20px;
            box-shadow:0 0 20px rgba(0,0,0,0.3);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:14px;
            margin-bottom:15px;
            border:none;
            border-radius:10px;
            background:#334155;
            color:white;
            font-size:15px;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#38bdf8;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            opacity:0.9;
        }

        .bottom-link{
            text-align:center;
            margin-top:20px;
        }

        a{
            color:#38bdf8;
            text-decoration:none;
        }

    </style>

</head>
<body>

    <div class="card">

        <h1>🏠 Create HomiAI Account</h1>

        <form method="POST">

            <input
                type="text"
                name="username"
                placeholder="Enter Username"
                required>

            <input
                type="email"
                name="email"
                placeholder="Enter Email"
                required>

            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required>

            <button type="submit">
                Create Account
            </button>

        </form>

        <div class="bottom-link">
            Already have an account?
            <a href="/login">Login</a>
        </div>

    </div>

</body>
</html>
